spring:
  application:
    name: paymentgateway

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect